name: Continuous Delivery to npm

on:
  push:
    branches:
      - main

# Prevent parallel runs from racing the version/tag step
concurrency:
  group: publish-npm-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Version Bump & Tag (idempotent)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ensure tags are present locally for correct existence checks
          git fetch --tags --force

          # Compute the next patch version and corresponding tag name
          CURRENT="$(node -p "require('./package.json').version")"
          NEXT="$(node -p "const [a,b,c]=require('./package.json').version.split('.').map(Number); console.log([a,b,c+1].join('.'))")"
          TAG="v${NEXT}"

          echo "Current version: ${CURRENT}"
          echo "Next version:    ${NEXT}"
          echo "Next tag:        ${TAG}"

          # If the tag already exists (e.g., rerun or previous successful run), skip bumping/tagging.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists. Skipping version bump & tag."
            exit 0
          fi

          npm version patch -m "chore: automated deployment version %s [skip ci]"
          git push origin main
          git push origin --tags

      - name: Install Dependencies
        run: npm ci

      - name: Build Library
        run: npm run build

      - name: Publish Package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}