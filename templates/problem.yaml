# adrcli problem input template
# Run: adrcli analyze --file templates/problem.yaml

title: "Customer Churn Prediction System"
description: >
  Build an ML system to predict customer churn 30 days in advance
  using transaction history, support ticket data, and usage patterns.
  The model must be explainable for compliance and serve predictions
  in real-time via REST API.

constraints:
  budget: "$50k/year infra"
  timeline: "6 months to production"
  team_size: 5
  compliance: "GDPR, SOC2"

stakeholders:
  - role: "Product"
    concern: "Model accuracy > 85% F1-score"
  - role: "Engineering"
    concern: "Maintainability, minimal ops burden"
  - role: "Legal/Compliance"
    concern: "Explainability, data residency"

successMetrics:
  - "Reduce monthly churn by 15% within 6 months"
  - "Model inference latency < 200ms p99"
  - "Explainability report per prediction for compliance"

existingStack:
  - "AWS"
  - "Python"
  - "PostgreSQL"
  - "Kafka"
